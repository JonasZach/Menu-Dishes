<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Παραδοσιακό Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=0.9">
    <meta name="theme-color" content="#111111">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #111111;
            color: #fff;
            font-family: Georgia, serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-image: url('green-background_image.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .logo {
            max-width: 280px;
            display: block;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <a href="menu.pdf" target="_blank">
        <button class="menu-btn">Click to see our menu</button>
    </a>
</body>
</html>
